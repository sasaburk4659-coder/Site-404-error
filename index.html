<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая кнопка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тестовая кнопка</h1>
        <button onclick="sendClick()">Кнопка 1</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        let lastClickTime = 0;
        
        async function sendClick() {
            const now = Date.now();
            // Защита от двойного нажатия (5 секунд)
            if (now - lastClickTime < 5000) {
                document.getElementById('message').innerHTML = '⏰ Подождите 5 секунд!';
                setTimeout(() => {
                    document.getElementById('message').innerHTML = '';
                }, 2000);
                return;
            }
            
            lastClickTime = now;
            
            try {
                const response = await fetch('/click', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ button: '1', timestamp: now })
                });
                
                const result = await response.json();
                document.getElementById('message').innerHTML = '✅ Кнопка нажата!';
                setTimeout(() => {
                    document.getElementById('message').innerHTML = '';
                }, 2000);
            } catch (error) {
                document.getElementById('message').innerHTML = '❌ Ошибка!';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>

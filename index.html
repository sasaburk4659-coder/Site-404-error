<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator's Chat - Только для чтения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .chat-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-header p {
            font-size: 0.85em;
            opacity: 0.9;
        }
        
        .creator-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: normal;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            animation: fadeInUp 0.3s ease;
            display: flex;
            justify-content: flex-start;
        }
        
        .message-wrapper {
            max-width: 70%;
            min-width: 200px;
        }
        
        .message-bubble {
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .creator-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message-sender {
            font-size: 0.75em;
            margin-bottom: 5px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .creator-message .message-sender {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .creator-icon {
            font-size: 1em;
        }
        
        .message-text {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .message-time {
            font-size: 0.65em;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            padding: 12px;
            border-radius: 25px;
            font-size: 0.9em;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:active {
            transform: translateY(0);
        }
        
        .warning {
            text-align: center;
            color: #ff6b6b;
            font-size: 0.75em;
            margin-top: 10px;
            padding: 8px;
            background: #fff5f5;
            border-radius: 10px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
        
        .stats {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8em;
            text-align: center;
            color: #1976d2;
            margin-bottom: 15px;
        }
        
        .error-page {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
        }
        
        .error-page h1 {
            font-size: 72px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        
        .error-page p {
            color: #666;
        }
        
        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-chat-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div id="content"></div>
    </div>
    
    <script>
        // Секретный токен для отправки сообщений
        const SECRET_TOKEN = "cr3at0r_ch4nn3l_s3cr3t_t0k3n_2024_ai_ml_deep_xyz";
        
        // Хранилище сообщений
        let messages = [];
        
        // Загрузка сообщений из localStorage
        function loadMessages() {
            const saved = localStorage.getItem('creator_chat_messages');
            if (saved) {
                messages = JSON.parse(saved);
                return true;
            }
            return false;
        }
        
        // Сохранение сообщений
        function saveMessages() {
            localStorage.setItem('creator_chat_messages', JSON.stringify(messages));
        }
        
        // Добавление сообщения (только от создателя)
        function addMessage(text, isCreator = true) {
            const newMessage = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                text: text,
                isCreator: isCreator
            };
            messages.push(newMessage);
            saveMessages();
            return newMessage;
        }
        
        // Получение всех сообщений
        function getAllMessages() {
            return messages;
        }
        
        // Форматирование времени
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            // Если сообщение сегодня
            if (diff < 86400000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }
            // Если в этом году
            else if (date.getFullYear() === now.getFullYear()) {
                return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
            }
            // Старые сообщения
            else {
                return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
            }
        }
        
        // Отображение сообщений
        function displayMessages() {
            const contentDiv = document.getElementById('content');
            
            if (!contentDiv) return;
            
            let html = `
                <div class="chat-header">
                    <h1>
                        💬 Creator's Chat
                        <span class="creator-badge">👑 Только для чтения</span>
                    </h1>
                    <p>Сообщения может отправлять только создатель через специальный скрипт</p>
                </div>
                <div class="messages-area" id="messagesArea">
            `;
            
            if (messages.length === 0) {
                html += `
                    <div class="empty-chat">
                        <div class="empty-chat-icon">💬</div>
                        <p>Пока нет сообщений от создателя</p>
                        <small style="color: #999;">Сообщения появятся здесь, когда создатель отправит их через Python скрипт</small>
                    </div>
                `;
            } else {
                // Показываем ВСЕ сообщения (и от создателя, и от обычных пользователей)
                // Но обычные пользователи не могут отправлять, только создатель
                messages.forEach(msg => {
                    if (msg.isCreator) {
                        // Сообщение от создателя
                        html += `
                            <div class="message creator-message">
                                <div class="message-wrapper">
                                    <div class="message-bubble">
                                        <div class="message-sender">
                                            <span class="creator-icon">👑</span>
                                            Создатель
                                        </div>
                                        <div class="message-text">
                                            ${escapeHtml(msg.text)}
                                        </div>
                                        <div class="message-time">
                                            ${formatTime(msg.timestamp)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Сообщение от обычного пользователя (но таких не будет, т.к. отправка заблокирована)
                        html += `
                            <div class="message">
                                <div class="message-wrapper">
                                    <div class="message-bubble" style="background: #e0e0e0;">
                                        <div class="message-sender" style="color: #666;">
                                            👤 Пользователь
                                        </div>
                                        <div class="message-text">
                                            ${escapeHtml(msg.text)}
                                        </div>
                                        <div class="message-time">
                                            ${formatTime(msg.timestamp)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            }
            
            html += `
                </div>
                <div class="chat-input-area">
                    <div class="input-group">
                        <input type="text" class="chat-input" placeholder="Отправлять сообщения может только создатель..." id="messageInput" disabled>
                        <button class="send-btn" disabled>Отправить</button>
                    </div>
                    <div class="warning">
                        ⚠️ Только создатель может отправлять сообщения через специальный Python скрипт
                    </div>
                </div>
            `;
            
            contentDiv.innerHTML = html;
            
            // Прокрутка вниз
            const messagesArea = document.getElementById('messagesArea');
            if (messagesArea) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Отправка сообщения (только через API)
        function sendMessageViaAPI(message) {
            if (!message || message.trim() === "") {
                return false;
            }
            
            addMessage(message, true);
            displayMessages();
            return true;
        }
        
        // Обработка API запросов через URL параметры
        function handleAPICall() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const action = urlParams.get('action');
            const message = urlParams.get('message');
            
            // Проверяем токен создателя
            if (token !== SECRET_TOKEN) {
                return false;
            }
            
            // Обработка добавления сообщения
            if (action === 'add' && message) {
                const decodedMessage = decodeURIComponent(message);
                sendMessageViaAPI(decodedMessage);
                // Очищаем URL после обработки
                window.history.replaceState({}, document.title, window.location.pathname);
                return true;
            }
            
            return false;
        }
        
        // Проверка доступа к чату (всегда показываем чат)
        function initChat() {
            loadMessages();
            displayMessages();
            handleAPICall();
            
            // Автоматическое обновление чата при изменении URL
            let lastUrl = window.location.href;
            setInterval(() => {
                if (window.location.href !== lastUrl) {
                    lastUrl = window.location.href;
                    handleAPICall();
                }
            }, 500);
        }
        
        // Запуск чата
        initChat();
    </script>
</body>
</html>
